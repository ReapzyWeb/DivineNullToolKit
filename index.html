<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141414">
<link rel="stylesheet" href="https://reapzyweb.github.io/DivineNullToolKit/assets/core/styling.css">
<link rel="stylesheet" id="theme-stylesheet" href="https://reapzyweb.github.io/DivineNullToolKit/assets/core/themes/dark.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background-color:#141414;display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;}
.splash-logo{width:200px;height:200px;object-fit:contain;display:block;}
.splash-pill{position:fixed;bottom:calc(var(--space-xl) + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);padding:var(--space-sm) var(--space-lg);background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:var(--radius-full);font-family:var(--font-body);font-size:var(--font-size-sm);color:var(--color-text-muted);white-space:nowrap;}
</style>
</head>
<body>
<img class="splash-logo" src="https://reapzyweb.github.io/DivineNullToolKit/assets/media/branding/logo.png" alt="Logo">
<div class="splash-pill">0.0.18 (TestBuild)</div>
<script src="https://reapzyweb.github.io/DivineNullToolKit/assets/core/script.js"></script>
<script>setTimeout(()=>{location.href='https://reapzyweb.github.io/DivineNullToolKit/application/home.html';},3000);</script>
</body>
</html>
